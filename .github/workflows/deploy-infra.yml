# Déploiement de l'infrastructure dev (Étape 2) — reproductible, jamais manuel (§10.1).
# Authentification par fédération OIDC (aucun secret Azure stocké, règle 16).
# Déclenché à la main (workflow_dispatch) et sur push vers main touchant infra/ ou api/.
name: deploy-infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "api/**"
      - ".github/workflows/deploy-infra.yml"

permissions:
  id-token: write # jeton OIDC pour azure/login
  contents: read

env:
  # Emplacement des métadonnées de déploiement (les ressources vont dans la région du .bicepparam).
  AZURE_REGION: francecentral

jobs:
  deployer:
    name: Déployer l'infrastructure dev + ping
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Identité du déployeur (administrateur Entra ID de SQL)
        run: echo "DEPLOYER_OBJECT_ID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)" >> "$GITHUB_ENV"

      # Un abonnement neuf n'a pas encore « activé » toutes les familles de services.
      # On enregistre les fournisseurs nécessaires et on attend ceux qui manquaient (Sql, Web).
      - name: Enregistrer les fournisseurs de ressources
        run: |
          for ns in Microsoft.Sql Microsoft.Web Microsoft.Storage Microsoft.KeyVault \
                    Microsoft.OperationalInsights Microsoft.Insights Microsoft.Consumption; do
            az provider register --namespace "$ns" --only-show-errors >/dev/null || true
          done
          for ns in Microsoft.Sql Microsoft.Web; do
            echo "Attente de l'enregistrement de $ns…"
            for i in $(seq 1 30); do
              etat=$(az provider show --namespace "$ns" --query registrationState -o tsv)
              echo "  $ns : $etat"
              [ "$etat" = "Registered" ] && break
              sleep 10
            done
          done

      # Le modèle est déduit du « using » du .bicepparam — ne pas passer --template-file.
      - name: Valider le déploiement (compilation + contrôle ARM)
        run: |
          az deployment sub validate \
            --name "dc-infra-validation-${{ github.run_number }}" \
            --location "$AZURE_REGION" \
            --parameters infra/dev.bicepparam

      - name: Déployer l'infrastructure (Bicep) — alerte de budget en premier
        run: |
          az deployment sub create \
            --name "dc-infra-${{ github.run_number }}" \
            --location "$AZURE_REGION" \
            --parameters infra/dev.bicepparam

      - name: Récupérer les sorties du déploiement
        run: |
          OUT=$(az deployment sub show --name dc-infra-${{ github.run_number }} --query properties.outputs -o json)
          echo "FUNCTION_APP=$(echo "$OUT" | jq -r .nomFunctionApp.value)" >> "$GITHUB_ENV"
          echo "SQL_FQDN=$(echo "$OUT" | jq -r .sqlFqdn.value)" >> "$GITHUB_ENV"
          echo "SQL_DATABASE=$(echo "$OUT" | jq -r .sqlDatabase.value)" >> "$GITHUB_ENV"
          echo "API_URL=$(echo "$OUT" | jq -r .urlApi.value)" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # L'API se connecte à SQL par identité managée : lui donner un accès à la base (§8, D-012).
      # Exécuté par le service principal, administrateur Entra de la base — aucune manip utilisateur.
      - name: Accorder l'accès SQL à l'identité managée du Function App
        run: |
          export SQL_ACCESS_TOKEN=$(az account get-access-token \
            --resource https://database.windows.net/ --query accessToken -o tsv)
          dotnet run --project tools/AccorderAccesSql -c Release -- "$SQL_FQDN" "$SQL_DATABASE" "$FUNCTION_APP"

      - name: Publier l'API (.NET 8 isolé)
        run: dotnet publish api/DeuxiemeCerveau.Api.csproj -c Release -o publish

      - name: Déployer l'API
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP }}
          package: publish

      - name: Vérifier que ping répond en ligne (§10.2)
        run: |
          echo "Attente du démarrage à froid (migrations au démarrage comprises)…"
          for i in $(seq 1 15); do
            if curl -fsS "${API_URL}/api/ping"; then
              echo ""
              echo "✓ ping répond."
              exit 0
            fi
            sleep 15
          done
          echo "✗ ping n'a pas répondu à temps." && exit 1

      - name: Tests de contrat en ligne (§8, §12 — fini quand ils passent)
        env:
          BASE_URL: ${{ env.API_URL }}
        run: dotnet run --project tools/TestsContrat -c Release
